<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>母亲节快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 背景图 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* 遮罩层 - 透明度 50% */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            z-index: 0;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 标题 */
        .title {
            font-size: 3.5rem;
            color: #ff69b4;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: fadeInDown 1s ease-out;
        }

        /* 鲜花飘落 */
        .flowers-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .flower {
            position: absolute;
            top: -50px;
            font-size: 24px;
            animation: fall linear infinite;
            opacity: 0.9;
        }

        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0.7;
            }
        }

        /* 按钮 */
        .btn {
            padding: 15px 50px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.4);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(255, 105, 180, 0.6);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 照片区域 */
        .photo-section {
            display: none; /* 初始隐藏 */
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        /* 照片框 —— 放大 40% */
        .photo-frame {
            width: 70vw;
            height: 80vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            border: 6px solid white;
            margin-bottom: 20px;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 文字区域 */
        .message {
            display: none; /* 初始隐藏 */
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .message h2 {
            color: #ff69b4;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        .message p {
            color: #666;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }

        #startScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #startScreen .btn {
            margin-top: 40px;
        }

        /* ===== 手机端适配（不影响电脑）===== */
        @media screen and (max-width: 768px) {
            .title {
                font-size: 2.2rem;
                padding: 0 15px;
            }
            .btn {
                padding: 12px 35px;
                font-size: 1.2rem;
            }
            .photo-frame {
                width: 90vw;
                height: 65vh;
            }
            .message {
                width: 90vw;
                padding: 20px;
            }
            .message h2 {
                font-size: 1.5rem;
            }
            .message p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>
    <div class="flowers-container" id="flowersContainer"></div>

    <div class="container">
        <!-- 初始标题和按钮 -->
        <div id="startScreen">
            <h1 class="title">妈妈，祝你节日快乐！</h1>
            <button class="btn" onclick="goToPhotos()">点我点我</button>
        </div>

        <!-- 照片区域 -->
        <div class="photo-section" id="photoSection">
            <div class="photo-frame">
                <img id="momPhoto" src="mom1.jpg" alt="妈妈的照片">
            </div>
            <button class="btn" id="nextBtn" onclick="nextStep()">下一张</button>
        </div>

        <!-- 文字区域 -->
        <div class="message" id="message">
            <h2>💝 给最爱的妈妈 💝</h2>
            
                在这个母亲节<br><br>
                祝你强壮，祝你挺拔<br><br>
                祝你平安，祝你万事胜意<br><br>
                感恩不止今天，愿爱永伴岁月<br><br>
            
            <button class="btn" style="margin-top: 20px;" onclick="restart()">再看一遍</button>
        </div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const flowers = ['🌸', '🌺', '🌹', '💐', '🌷', '✿', '❀', '🌼'];

        function createFlowers() {
            const container = document.getElementById('flowersContainer');
            for (let i = 0; i < 30; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                flower.style.left = Math.random() * 100 + '%';
                flower.style.animationDuration = (Math.random() * 3 + 4) + 's';
                flower.style.animationDelay = Math.random() * 5 + 's';
                flower.style.fontSize = (Math.random() * 10 + 20) + 'px';
                container.appendChild(flower);
            }
        }

        const momPhotos = [
            'mom1.jpg',
            'mom2.jpg',
            'mom3.jpg'
        ];
        let currentPhotoIndex = 0;

        function goToPhotos() {
            document.getElementById('startScreen').classList.add('hidden');
            // 修改点1：统一使用 style.display 控制显隐，避免冲突
            document.getElementById('photoSection').style.display = 'flex';
            updatePhoto();
        }

        function updatePhoto() {
            document.getElementById('momPhoto').src = momPhotos[currentPhotoIndex];
        }

        function nextStep() {
            currentPhotoIndex++;
            // 修改点2：逻辑优化，如果没到最后一张就更新图片，到了最后一张才显示文字
            if (currentPhotoIndex < momPhotos.length) {
                updatePhoto();
            } else {
                document.getElementById('photoSection').style.display = 'none';
                document.getElementById('message').style.display = 'block';
            }
        }

        function restart() {
            currentPhotoIndex = 0;
            document.getElementById('message').style.display = 'none';
            document.getElementById('photoSection').style.display = 'none';
            document.getElementById('startScreen').classList.remove('hidden');
        }

        document.addEventListener('click', () => {
            const audio = document.getElementById('bgMusic');
            if (audio.paused) audio.play().catch(() => {});
        }, { once: true });

        window.onload = createFlowers;
    </script>
</body>
</html>
